<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/log-in.css">
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<div class="container-fluid">
    <div class="container-fluid d-flex align-items-center justify-content-center">
      <div class="container nav-item bg" style="width: 88px; color: gainsboro;">
        <a href="index.html" class="text-center nav-link active  text-decoration-none text-center">regresar</a>
      </div>
    <hr>
    <div class="container-fluid container">
    <div class="container d-flex align-items-center justify-content-center">
    <img src="img/logo.png" class="logo img-fluid" alt="">
    </div>
    </div>
  </div>
<div class="container card-box">
      <h3 class="text-center clasic-text">Registrarse</h3>
<div class="row">
  <div class="mb-3 col-sm-7">
  <label for="exampleFormControlInput1" class="form-label">Email address</label>
  <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="name@example.com">
</div>
</div>
<div class="row">
<label for="inputPassword5" class="form-label">Contraseña</label>
<input type="password" id="inputPassword5" class="form-control" aria-describedby="passwordHelpBlock">
<div id="passwordHelpBlock" class="form-text">
  Tu contraseña debe tener entre 8 a 20 caracteres,debe contener letras y numeros, no debe contener espacios ni especiales caracteres y emoticonos 
</div>
</div>
<div class="container">
  <div class="row g-3">
  <div class="col-sm-7">
    <input type="text" class="form-control" placeholder="City" aria-label="City">
  </div>
  <div class="col-sm">
    <input type="text" class="form-control" placeholder="State" aria-label="State">
  </div>
  <div class="col-sm">
    <input type="text" class="form-control" placeholder="Zip" aria-label="Zip">
  </div>
</div>
<br>
<div class="text-center mb-3">
    <button type="button" class="btn btn-primary">Inicar Sesion</button>
  </div>
</div>
</div>

<p class="text-center mt-3 parrafo lead ">
  ¿Ya tienes una cuenta?
    <a href="login-in.html" class="link">Registrarse</a>
</p>

</html>
